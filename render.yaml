services:
  - type: web
    runtime: node
    name: holdquarter
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: STYTCH_PROJECT_ID
        sync: false
      - key: STYTCH_SECRET
        sync: false
      - key: STYTCH_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: UNIT_API_TOKEN
        sync: false
      - key: UNIT_API_URL
        value: https://api.s.unit.co/v1
      - key: APP_URL
        value: https://holdquarter.astraintelligence.co
      - key: POLSIA_EMAIL_PROXY_URL
        sync: false
      - key: POLSIA_ANALYTICS_SLUG
        sync: false
